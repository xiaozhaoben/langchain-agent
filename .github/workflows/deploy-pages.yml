name: Deploy Vue Module to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/vue-gh-pages/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: frontend/vue-gh-pages

      - name: Build
        run: npm run build
        working-directory: frontend/vue-gh-pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/vue-gh-pages/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
